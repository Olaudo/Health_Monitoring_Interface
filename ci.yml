name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vitalwatch
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: vitalwatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint with ruff
        run: |
          cd backend
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql://vitalwatch:secret@localhost:5432/vitalwatch_test
          JWT_SECRET: test-secret-key
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vitalwatch-api ./backend

      - name: Verify image starts
        run: |
          docker run -d --name test-api \
            -e DATABASE_URL=sqlite:///./test.db \
            -e JWT_SECRET=ci-secret \
            -p 8000:8000 \
            vitalwatch-api \
            uvicorn main:app --host 0.0.0.0 --port 8000
          sleep 5
          curl -f http://localhost:8000/health
          docker stop test-api
